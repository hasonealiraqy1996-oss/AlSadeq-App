<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الصادق للحضور</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #020406; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { text-align: center; padding: 20px; width: 90%; max-width: 400px; background: #1a1a1a; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h2 { margin-bottom: 20px; color: #00d4ff; }
        button { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 10px; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .btn-in { background-color: #28a745; color: white; }
        .btn-out { background-color: #dc3545; color: white; }
        #status { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h2>شركة الصادق</h2>
        <p id="userName">جاري التحقق...</p>
        <button class="btn-in" onclick="sendRequest('IN')">تسجيل حضور</button>
        <button class="btn-out" onclick="sendRequest('OUT')">تسجيل انصراف</button>
        <div id="status"></div>
    </div>

    <script>
        // ضع هنا رابطك الذي ينتهي بـ /exec
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbx8SepSX8sf_UFgA752pm8brD8Rg9YiDKPUGEAsxj7LmTuuYAMiC64ryyTamahjFM07/exec";

        const urlParams = new URLSearchParams(window.location.search);
        const employeeId = urlParams.get('id');

        document.getElementById('userName').innerText = employeeId ? "الموظف: " + employeeId : "خطأ: لم يتم تحديد موظف";

        function sendRequest(type) {
            if(!employeeId) return alert("الرابط غير صالح");
            
            document.getElementById('status').innerText = "جاري الإرسال...";
            
            // الربط المباشر بالسيرفر
            fetch(`${WEB_APP_URL}?action=record&id=${employeeId}&type=${type}`)
                .then(res => res.text())
                .then(data => {
                    document.getElementById('status').innerText = data;
                })
                .catch(err => {
                    document.getElementById('status').innerText = "حدث خطأ في الاتصال";
                    console.error(err);
                });
        }
    </script>
</body>
</html>
