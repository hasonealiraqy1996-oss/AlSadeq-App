<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>شركة الصادق | النظام الآمن</title>
    
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            overflow: hidden; background-color: #020406; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        iframe { border: none; width: 100%; height: 100%; display: block; }
    </style>
</head>
<body>

    <iframe 
        id="appFrame"
        src="https://script.google.com/macros/s/AKfycbyvZlD5EgwDCqR_MhUkl5XwK-LzUG9WK9u8tD-rQbgelxrYYsCk1LMX4cHuVI0rbai6/exec" 
        allow="geolocation; camera">
    </iframe>

    <script>
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const idFromUrl = urlParams.get('id');
            const frame = document.getElementById('appFrame');
            
            if (idFromUrl) {
                const baseUrl = frame.src.split('?')[0]; 
                frame.src = baseUrl + "?id=" + encodeURIComponent(idFromUrl);
            }
        };
    </script>
</body>
</html>
