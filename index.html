<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="شركة الصادق">
    
    <title>شركة الصادق | النظام الآمن</title>
    
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/5968/5968322.png">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/5968/5968322.png">
    
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <div class="bg-glow"></div>

    <div id="splash-screen" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(255, 255, 255, 0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10000; transition: 1s cubic-bezier(0.77, 0, 0.175, 1);">
        <div style="text-align: center;">
            <h1 style="font-size: 55px; font-weight: 900; margin: 0; background: linear-gradient(to bottom, #007bff, #0056b3); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -1px;">شركة الصادق</h1>
            <p style="color: #007bff; letter-spacing: 5px; font-size: 12px; font-weight: 300; margin-top: 10px; opacity: 0.8;">PREMIUM MANAGEMENT SYSTEM</p>
            <div style="margin-top: 50px; position: relative; cursor: pointer;" onclick="checkLocationAndEnter()">
                <button style="position: relative; background: #007bff; border: none; color: white; padding: 18px 60px; border-radius: 50px; font-size: 16px; cursor: pointer; box-shadow: 0 10px 20px rgba(0,123,255,0.3);">دخول النظام الآمن</button>
            </div>
            <p style="font-size: 10px; color: rgba(0,0,0,0.4); margin-top: 25px; letter-spacing: 1px;">يتم التحقق من الموقع الجغرافي تلقائياً</p>
        </div>
    </div>

    <div id="main-content" style="display: none; opacity: 0; transition: 1.5s; width: 100%; justify-content: center; align-items: center; min-height: 100vh;">
        <div class="glass-card">
            <div style="font-size: 11px; color: #007bff; font-weight: bold; letter-spacing: 3px; text-transform: uppercase;">AL-SADEQ PREMIUM</div>
            <h2 style="color: #333; font-size: 26px; margin: 15px 0;">نظام الحضور والإنصراف</h2>
            <div class="user-badge">
                <div id="emp-name" style="font-size: 28px; font-weight: bold; color: #333;">جاري التعرف...</div>
                <div id="p-id" style="color: #666;">---</div>
            </div>
            <div style="margin-bottom: 40px;">
                <div class="time-text" id="cur-time" style="color: #333;">00:00:00</div>
                <div id="cur-date" style="font-size: 14px; color: rgba(0,0,0,0.5); margin-top: 8px;">---</div>
            </div>
            <button id="btnIn" class="btn-modern btn-in">تسجيل حضور</button>
            <button id="btnOut" class="btn-modern btn-out">تسجيل انصراف</button>
            <div id="msg" style="margin-top: 20px; font-size: 14px; color: #007bff; font-weight: 500;"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
