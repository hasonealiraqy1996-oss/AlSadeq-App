<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>شركة الصادق</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="logo.png">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">

    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            overflow: hidden; background-color: #020406; font-family: sans-serif;
        }
        iframe { border: none; width: 100%; height: 100%; display: block; }

        /* زر الإدارة المقفل */
        .admin-trigger-btn {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 45px;
            height: 45px;
            background: rgba(1, 77, 174, 0.3); /* لون خفيف جداً لكي لا يزعج الموظف */
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }

        /* نافذة إدخال الرمز السري */
        #adminPanel {
            display: none; position: fixed; top: 15%; left: 10%; right: 10%;
            background: #1a1d21; border: 2px solid #014dae; color: white;
            padding: 25px; border-radius: 15px; z-index: 9999; text-align: center;
            box-shadow: 0 0 30px rgba(0,0,0,0.9);
        }
        
        input { 
            width: 90%; padding: 12px; margin: 8px 0; border-radius: 8px; 
            border: 1px solid #333; background: #000; color: #fff; text-align: center; font-size: 16px;
        }
        
        .btn-action { 
            width: 95%; padding: 12px; margin: 10px 0; border-radius: 8px; 
            border: none; background: #014dae; color: white; font-weight: bold; cursor: pointer; 
        }
        
        .btn-close { background: #444; margin-top: 5px; width: 95%; padding: 10px; border-radius: 8px; border: none; color: white; }
    </style>

    <script>
        // دالة لفتح اللوحة بعد التأكد من الرمز
        function checkAdminAccess() {
            const pass = prompt("أدخل رمز الدخول للإدارة:");
            if (pass === "1234") { // هذا هو الرمز الذي يفتح اللوحة
                document.getElementById('adminPanel').style.display = 'block';
            } else if (pass !== null) {
                alert("الرمز غير صحيح!");
            }
        }

        // حفظ بيانات الموظف
        function saveDevice() {
            const empName = document.getElementById('empNameInput').value;
            const empSerial = document.getElementById('empSerialInput').value;
            const confirmPass = document.getElementById('finalPass').value;

            if (empName === "" || empSerial === "") {
                alert("يرجى ملء كافة البيانات");
                return;
            }

            if (confirmPass === "787898") {
                const uniqueToken = "SADEQ-" + empSerial + "-" + btoa(empName).substring(0, 8);
                localStorage.setItem('sadeq_device_token', uniqueToken);
                localStorage.setItem('employee_name', empName);
                localStorage.setItem('employee_serial', empSerial);

                alert("تم ربط الهاتف بنجاح بـ " + empName);
                document.getElementById('adminPanel').style.display = 'none';
                location.reload();
            } else {
                alert("رمز التفعيل خطأ!");
            }
        }
    </script>
</head>
<body>

    <div class="admin-trigger-btn" onclick="checkAdminAccess()">⚙️</div>

    <div id="adminPanel">
        <h2 style="color: #014dae; margin-bottom: 10px;">إعدادات الموظف</h2>
        <input type="text" id="empNameInput" placeholder="اسم الموظف">
        <input type="text" id="empSerialInput" placeholder="الرقم التسلسلي">
        <input type="password" id="finalPass" placeholder="رمز تأكيد المدير">
        
        <button class="btn-action" onclick="saveDevice()">تثبيت الهوية على الجهاز</button>
        <button class="btn-close" onclick="document.getElementById('adminPanel').style.display='none'">إلغاء</button>
    </div>

    <iframe 
        id="appFrame"
        src="https://script.google.com/macros/s/AKfycbwGYiWzwa32EBtWx2IfQvfH7tYrRnEZ8lS4n1dHng3cm9cB_eU2RhOMQPU3mqwpNF0-/exec" 
        allow="geolocation; camera">
    </iframe>

    <script>
        window.onload = function() {
            const token = localStorage.getItem('sadeq_device_token');
            const name = localStorage.getItem('employee_name');
            if (token) {
                const frame = document.getElementById('appFrame');
                frame.onload = function() {
                    frame.contentWindow.postMessage({ 
                        'device_token': token,
                        'employee_name': name 
                    }, "*");
                };
            }
        };
    </script>
</body>
</html>
