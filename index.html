<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>شركة الصادق | الإدارة المركزية</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root { 
            --navy: #0b162c; 
            --gold: #c5a059; 
            --white: #ffffff;
            --glass: rgba(255, 255, 255, 0.05);
        }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100vh; 
            background: linear-gradient(135deg, #0b162c 0%, #1a2a4a 100%);
            display: flex; justify-content: center; align-items: center; 
            font-family: 'Segoe UI', sans-serif; direction: rtl; color: white;
        }

        .container { 
            background: var(--glass); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px; 
            padding: 40px; 
            width: 90%; max-width: 400px; 
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h1 { font-size: 32px; font-weight: 700; color: var(--gold); margin-bottom: 5px; }
        .sub-title { font-size: 12px; letter-spacing: 3px; color: rgba(255,255,255,0.6); margin-bottom: 30px; }

        .btn-action { 
            width: 100%; padding: 18px; border: none; border-radius: 15px; 
            font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px;
            transition: 0.3s;
        }
        .btn-in { background: var(--gold); color: #0b162c; }
        .btn-out { background: transparent; border: 1px solid var(--gold); color: var(--gold); }
        .btn-action:active { transform: scale(0.98); }

        .badge { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 20px; margin-bottom: 25px; }
        #emp-name { font-size: 20px; font-weight: bold; }
        #p-id { font-size: 12px; color: var(--gold); margin-top: 5px; }
    </style>
</head>
<body>

    <div id="splash-screen" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0b162c; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10000; transition: 1s;">
        <h1 style="font-size: 40px;">شركة الصادق</h1>
        <p style="color: var(--gold);">نظام الإدارة الرقمي</p>
        <button onclick="checkLocationAndEnter()" style="margin-top: 50px; background: none; border: 1px solid var(--gold); color: var(--gold); padding: 15px 40px; border-radius: 30px; cursor: pointer;">بدء الدخول</button>
    </div>

    <div id="main-content" class="container" style="display: none; opacity: 0; transition: 1s;">
        <h1>شركة الصادق</h1>
        <div class="sub-title">PREMIUM SYSTEM</div>
        
        <div class="badge">
            <div id="emp-name">جاري التعرف...</div>
            <div id="p-id">---</div>
        </div>

        <div style="font-size: 30px; margin-bottom: 20px;" id="cur-time">00:00:00</div>
        
        <button id="btnIn" class="btn-action btn-in">تسجيل حضور</button>
        <button id="btnOut" class="btn-action btn-out">تسجيل انصراف</button>
    </div>

    <script>
        const COMPANY_LAT = 33.306140; 
        const COMPANY_LNG = 44.514822; 
        const ALLOWED_RADIUS = 500;
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyvZlD5EgwDCqR_MhUkl5XwK-LzUG9WK9u8tD-rQbgelxrYYsCk1LMX4cHuVI0rbai6/exec";
        const urlParams = new URLSearchParams(window.location.search);
        const deviceId = urlParams.get('id') || "UNKNOWN";

        // تحديث الوقت
        function updateClock() {
            const tEl = document.getElementById('cur-time');
            if (tEl) tEl.innerText = new Date().toLocaleTimeString('en-GB');
        }
        setInterval(updateClock, 1000);

        // تحميل بيانات الموظف
        window.onload = function() {
            fetch(`${WEB_APP_URL}?id=${encodeURIComponent(deviceId)}`)
                .then(r => r.json())
                .then(status => {
                    if (status.registered) {
                        document.getElementById('emp-name').innerText = status.name;
                        document.getElementById('p-id').innerText = "ID: " + deviceId;
                    } else {
                        document.getElementById('emp-name').innerText = "جهاز غير معرف";
                    }
                });
            document.getElementById('btnIn').onclick = () => processAction('IN');
            document.getElementById('btnOut').onclick = () => processAction('OUT');
        };

        function startSystem() {
            const splash = document.getElementById('splash-screen');
            const main = document.getElementById('main-content');
            splash.style.opacity = '0';
            setTimeout(() => {
                splash.style.display = 'none';
                main.style.display = 'block';
                setTimeout(() => main.style.opacity = '1', 50);
            }, 1000);
        }

        function checkLocationAndEnter() {
            Swal.fire({ title: 'جاري التحقق من النطاق...', didOpen: () => Swal.showLoading() });
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    const d = calculateDistance(pos.coords.latitude, pos.coords.longitude, COMPANY_LAT, COMPANY_LNG);
                    if (d <= ALLOWED_RADIUS) { Swal.close(); startSystem(); }
                    else { Swal.fire('خارج النطاق', `أنت بعيد عن الشركة بمقدار ${(d/1000).toFixed(2)} كم.`, 'error'); }
                }, () => Swal.fire('خطأ', 'يرجى تفعيل الموقع.', 'warning'));
            }
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const dLat = (lat2 - lat1) * Math.PI/180;
            const dLon = (lon2 - lon1) * Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function processAction(type) {
            const name = document.getElementById('emp-name').innerText;
            fetch(`${WEB_APP_URL}?action=record&name=${encodeURIComponent(name)}&type=${type}&id=${encodeURIComponent(deviceId)}`)
                .then(r => r.text())
                .then(res => Swal.fire('تنبيه', res.replace(/[✅⚠️❌]/g, ''), 'info'));
        }
    </script>
</body>
</html>
