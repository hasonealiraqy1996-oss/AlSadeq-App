<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="شركة الصادق">
    
    <title>شركة الصادق | النظام الآمن</title>
    
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/5968/5968322.png">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/5968/5968322.png">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root { --primary: #00f2ff; --accent: #7000ff; --glass: rgba(255, 255, 255, 0.03); --border: rgba(255, 255, 255, 0.1); --bg-dark: #020406; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100vh; display: flex; justify-content: center; align-items: center; background: var(--bg-dark); overflow: hidden; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; direction: rtl; }
        .bg-glow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 10% 10%, rgba(0, 242, 255, 0.08) 0%, transparent 50%), radial-gradient(circle at 90% 90%, rgba(112, 0, 255, 0.08) 0%, transparent 50%), radial-gradient(circle at 50% 50%, rgba(2, 4, 6, 1) 0%, transparent 100%); filter: blur(60px); z-index: -1; animation: pulse-bg 12s infinite alternate ease-in-out; }
        @keyframes pulse-bg { from { transform: scale(1) rotate(0deg); opacity: 0.5; } to { transform: scale(1.1) rotate(2deg); opacity: 0.9; } }
        .glass-card { background: var(--glass); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); border: 1px solid var(--border); border-radius: 45px; padding: 55px 40px; width: 90%; max-width: 400px; box-shadow: 0 50px 100px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(255, 255, 255, 0.02); text-align: center; z-index: 10; transition: 0.5s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .user-badge { background: rgba(255, 255, 255, 0.015); border-radius: 30px; padding: 35px 20px; margin: 30px 0; border: 1px solid rgba(0, 242, 255, 0.08); position: relative; overflow: hidden; box-shadow: inset 0 0 15px rgba(0,0,0,0.2); }
        #p-id { font-size: 15px !important; color: var(--primary) !important; font-weight: 900 !important; letter-spacing: 2px !important; text-shadow: 0 0 15px rgba(0, 242, 255, 0.8); background: rgba(0, 242, 255, 0.2) !important; padding: 8px 20px !important; border-radius: 12px !important; display: inline-block !important; margin-top: 15px !important; border: 1px solid rgba(0, 242, 255, 0.4) !important; font-family: 'Courier New', monospace; }
        .btn-modern { width: 100%; padding: 22px; border: none; border-radius: 22px; font-size: 18px; font-weight: 700; color: white; cursor: pointer; margin-bottom: 18px; transition: 0.4s; }
        .btn-in { background: linear-gradient(135deg, #00f2ff, #0066ff); box-shadow: 0 15px 35px rgba(0, 242, 255, 0.15); }
        .btn-out { background: linear-gradient(135deg, #ff0055, #ff5500); box-shadow: 0 15px 35px rgba(255, 0, 85, 0.15); }
        .time-text { font-size: 36px; font-weight: 200; color: #fff; letter-spacing: 3px; }
        .swal2-popup { background: #0a0f14 !important; border: 2px solid var(--primary) !important; border-radius: 35px !important; color: #fff !important; }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div id="splash-screen" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10000; transition: 1s cubic-bezier(0.77, 0, 0.175, 1);">
        <div style="text-align: center;">
            <h1 style="font-size: 55px; font-weight: 900; margin: 0; background: linear-gradient(to bottom, #ffffff, #888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -1px;">شركة الصادق</h1>
            <p style="color: var(--primary); letter-spacing: 5px; font-size: 12px; font-weight: 300; margin-top: 10px; opacity: 0.8;">PREMIUM MANAGEMENT SYSTEM</p>
            <div style="margin-top: 50px; position: relative; cursor: pointer;" onclick="checkLocationAndEnter()">
                <button style="position: relative; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 18px 60px; border-radius: 50px; font-size: 16px; cursor: pointer; backdrop-filter: blur(10px);">دخول النظام الآمن</button>
            </div>
            <p style="font-size: 10px; color: rgba(255,255,255,0.3); margin-top: 25px; letter-spacing: 1px;">يتم التحقق من الموقع الجغرافي تلقائياً</p>
        </div>
    </div>

    <div id="main-content" style="display: none; opacity: 0; transition: 1.5s; width: 100%; justify-content: center; align-items: center; min-height: 100vh;">
        <div class="glass-card">
            <div style="font-size: 11px; color: var(--primary); font-weight: bold; letter-spacing: 3px; text-transform: uppercase;">AL-SADEQ PREMIUM</div>
            <h2 style="color: #fff; font-size: 26px; margin: 15px 0;">نظام الحضور والإنصراف</h2>
            <div class="user-badge">
                <div id="emp-name" style="font-size: 28px; font-weight: bold; color: #fff;">جاري التعرف...</div>
                <div id="p-id">---</div>
            </div>
            <div style="margin-bottom: 40px;">
                <div class="time-text" id="cur-time">00:00:00</div>
                <div id="cur-date" style="font-size: 14px; color: rgba(255,255,255,0.5); margin-top: 8px;">---</div>
            </div>
            <button id="btnIn" class="btn-modern btn-in">تسجيل حضور ذكي</button>
            <button id="btnOut" class="btn-modern btn-out">تسجيل انصراف آمن</button>
            <div id="msg" style="margin-top: 20px; font-size: 14px; color: #00f2ff; font-weight: 500;"></div>
        </div>
    </div>

    <script>
        const COMPANY_LAT = 33.306140; 
        const COMPANY_LNG = 44.514822; 
        const ALLOWED_RADIUS = 500;
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyvZlD5EgwDCqR_MhUkl5XwK-LzUG9WK9u8tD-rQbgelxrYYsCk1LMX4cHuVI0rbai6/exec";

        const urlParams = new URLSearchParams(window.location.search);
        const deviceId = urlParams.get('id') || "UNKNOWN";

        function updateClock() {
            const dEl = document.getElementById('cur-date');
            const tEl = document.getElementById('cur-time');
            if (dEl && tEl) {
                const now = new Date();
                dEl.innerText = now.toLocaleDateString('ar-IQ', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
                tEl.innerText = now.toLocaleTimeString('en-GB');
            }
        }
        setInterval(updateClock, 1000);

        window.onload = function() {
            fetch(`${WEB_APP_URL}?id=${encodeURIComponent(deviceId)}`)
                .then(r => r.json())
                .then(status => {
                    const empElement = document.getElementById('emp-name');
                    const pId = document.getElementById('p-id');
                    if (status.registered) {
                        empElement.innerText = status.name;
                        pId.innerText = deviceId;
                    } else {
                        empElement.innerText = "جهاز غير معرف";
                    }
                });
            document.getElementById('btnIn').onclick = () => processAction('IN');
            document.getElementById('btnOut').onclick = () => processAction('OUT');
        };

        function startSystem() {
            const splash = document.getElementById('splash-screen');
            const main = document.getElementById('main-content');
            splash.style.opacity = '0';
            splash.style.transform = 'translateY(-100%)';
            setTimeout(() => {
                splash.style.display = 'none';
                main.style.display = 'flex';
                setTimeout(() => main.style.opacity = '1', 50);
            }, 1000);
        }

        function checkLocationAndEnter() {
            Swal.fire({ title: 'جاري فحص النطاق الأمني', html: 'يتم التحقق من موقعك...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    const d = calculateDistance(pos.coords.latitude, pos.coords.longitude, COMPANY_LAT, COMPANY_LNG);
                    if (d <= ALLOWED_RADIUS) { Swal.close(); startSystem(); }
                    else { Swal.fire({ icon: 'error', title: 'دخول مرفوض', text: `بعيد عن الشركة بمقدار ${(d/1000).toFixed(2)} كم.` }); }
                }, () => Swal.fire({ icon: 'warning', title: 'خدمة الموقع معطلة', text: 'يرجى تفعيل الـ GPS.' }));
            }
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const dLat = (lat2 - lat1) * Math.PI/180;
            const dLon = (lon2 - lon1) * Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function processAction(type) {
            const name = document.getElementById('emp-name').innerText;
            if(name.includes("جاري") || name.includes("غير معرف")) return Swal.fire('تنبيه', 'يرجى الانتظار أو التأكد من معرف الجهاز', 'warning');
            
            fetch(`${WEB_APP_URL}?action=record&name=${encodeURIComponent(name)}&type=${type}&id=${encodeURIComponent(deviceId)}`)
                .then(r => r.text())
                .then(res => {
                    Swal.fire({ icon: res.includes("✅") ? 'success' : 'info', title: 'العملية', text: res.replace(/[✅⚠️❌]/g, '') });
                });
        }
    </script>
</body>
</html>
